name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate config.local.js from secrets
        env:
          CLIENT_ID: ${{ secrets.GCAL_CLIENT_ID }}
          API_KEY: ${{ secrets.GCAL_API_KEY }}
          MAP_ID: ${{ secrets.GCAL_MAP_ID }}
          CALENDAR_BACKEND_URL: ${{ secrets.GCAL_CALENDAR_BACKEND_URL }}
        run: |
          if [ -z "$CLIENT_ID" ] || [ -z "$API_KEY" ]; then
            echo "Erreur: GCAL_CLIENT_ID ou GCAL_API_KEY manquant dans les secrets GitHub."
            exit 1
          fi
          if [ -z "$CALENDAR_BACKEND_URL" ]; then
            echo "::warning::GCAL_CALENDAR_BACKEND_URL est vide — Calendar ne marchera pas dans Bluefy."
            echo "Ajoutez l'URL Render dans Settings → Secrets → Actions → GCAL_CALENDAR_BACKEND_URL"
          fi
          cat > config.local.js << EOF
          window.GCAL_CONFIG = {
            CLIENT_ID: "${CLIENT_ID}",
            API_KEY: "${API_KEY}",
            MAP_ID: "${MAP_ID}",
            OAUTH_REDIRECT_URI: "https://emiliwasabi.github.io/nomad/",
            CALENDAR_BACKEND_URL: "${CALENDAR_BACKEND_URL}",
          };
          EOF
          echo "config.local.js genere (CALENDAR_BACKEND_URL renseigne: $([ -n "$CALENDAR_BACKEND_URL" ] && echo oui || echo non))"

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v4
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v4
