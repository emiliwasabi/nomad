<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="theme-color" content="#0a0a0a" />
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="css/player.css" />
    <title>Murmur</title>
    <script defer src="config.local.js"></script>
    <script defer src="js/guidance/guidanceMath.js"></script>
    <script defer src="js/location/locationTracker.js"></script>
    <script defer src="js/guidance/mapsAddressResolver.js"></script>
    <script defer src="js/audio/spatialAudioBeginner.js"></script>
    <script defer src="js/app/compass.js"></script>
    <script defer src="js/app/routeService.js"></script>
    <script defer src="js/app/calendarBackend.js"></script>
    <script defer src="js/app/calendarAuth.js"></script>
    <script defer src="js/app/calendarNextEvent.js"></script>
    <script defer src="js/app/bundledMusic.js"></script>
    <script defer src="js/app/musicLibrary.js"></script>
    <script defer src="js/app/spatialNavigation.js"></script>
    <script defer src="js/app/navigationEngine.js"></script>
    <script defer src="js/app/playerApp.js"></script>
    <script defer src="js/app/bleController.js"></script>
  </head>
  <body>
    <div class="app">
      <header class="header">
        <h1>Murmur</h1>
        <p class="subtitle">Suivez la musique dans l'espace</p>
      </header>

      <section class="panel now-playing">
        <p id="track_title" class="track-title">Aucun morceau</p>
        <p id="track_artist" class="track-artist">Collection Murmur</p>
        <div class="controls">
          <button
            id="play_button"
            type="button"
            class="btn btn-primary"
            disabled
          >
            Play
          </button>
          <button id="pause_button" type="button" class="btn" disabled>
            Pause
          </button>
        </div>
      </section>

      <section class="panel">
        <label class="file-label">
          Ajouter d'autres morceaux
          <input id="library_input" type="file" accept="audio/*" multiple />
        </label>
        <ul id="library_list" class="library-list"></ul>
      </section>

      <section class="panel status-panel">
        <button
          id="connect_calendar_button"
          type="button"
          class="btn btn-ghost"
        >
          Connecter Google Calendar
        </button>
        <p id="event_status" class="status-line">
          Prochain evenement: en attente
        </p>
        <p id="nav_status" class="status-line">Navigation: inactive</p>
        <p id="alignment_status" class="status-line">Alignement: —</p>
        <button id="ble_connect_button" type="button" class="btn btn-ghost">
          Connecter bouton Murmur
        </button>
      </section>
    </div>
  </body>
</html>
